<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banneton — Legal</title>
<style>
  :root { --ink:#2E2014; --sub:#8A7355; --accent:#C07A1E; --bg:#EDE7DA; --card:#fff; --hair:#D8CFBE; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans",sans-serif; }
  .wrap { max-width:720px; margin:0 auto; padding:64px 22px; }
  .brand { color:var(--accent); font-weight:700; }
  h1 { font-size:2rem; margin:.1em 0; }
  .sub { color:var(--sub); margin-bottom:2em; }
  a.card { display:block; background:var(--card); border:1px solid var(--hair); border-radius:14px;
    padding:18px 20px; margin:12px 0; text-decoration:none; color:var(--ink); font-weight:600; }
  a.card span { display:block; color:var(--sub); font-weight:400; font-size:.9rem; margin-top:2px; }
  .foot { margin-top:2.5em; color:var(--sub); font-size:.85rem; }
  .foot a { color:var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <p class="brand">Banneton</p>
  <h1>Legal</h1>
  <p class="sub">Sourdough starter & baking log · by Softgrove</p>
  <a class="card" href="privacy.html">Privacy Policy<span>How Banneton handles your data (everything stays on your device).</span></a>
  <a class="card" href="terms.html">Terms of Use<span>The terms you agree to when using Banneton.</span></a>
  <p class="foot">Questions: <a href="mailto:softgrove@duck.com">softgrove@duck.com</a></p>
</div>
</body>
</html>
